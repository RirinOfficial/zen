		<audio id="bg-music" loop src="zen.mp3"></audio>

		<button id="music-btn">♪ play</button>

		<style>
			#music-btn {
				position: fixed;
				bottom: 20px;
				right: 20px;
				background: none;
				border: 1px solid #f2f2f2;
				color: #f2f2f2;
				padding: 8px 14px;
				cursor: pointer;
				font-family: 'Roboto Condensed', 'SUIT', 'nanum gothic', 'malgun gothic', 'Sans-serif';
				font-size: 12px;
				letter-spacing: 1px;
				z-index: 999;
				opacity: 0.7;
				transition: opacity 0.3s;
			}
			#music-btn:hover {
				opacity: 1;
			}
		</style>

		<script>
			const music = document.getElementById('bg-music');
			const btn = document.getElementById('music-btn');
			music.volume = 0.70; // volume kecil biar chill

			// Coba autoplay pas load
			window.addEventListener('load', () => {
				music.play().catch(() => {
					// Kalo diblok, nunggu user klik di mana aja
					const playOnce = () => {
						music.play();
						btn.innerHTML = '♪ pause';
						document.removeEventListener('click', playOnce);
						document.removeEventListener('touchstart', playOnce);
					}
					document.addEventListener('click', playOnce, { once: true });
					document.addEventListener('touchstart', playOnce, { once: true });
				});
			});

			// Tombol play/pause manual
			btn.addEventListener('click', (e) => {
				e.stopPropagation();
				if (music.paused) {
					music.play();
					btn.innerHTML = '♪ pause';
				} else {
					music.pause();
					btn.innerHTML = '♪ play';
				}
			});
		</script>
